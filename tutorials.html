<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tutorials and Walkthroughs</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="site-header"></div>

  <main class="privacy-page blog-directory-page tutorial-directory-page">
    <section class="privacy-hero blog-directory-hero">
      <p class="privacy-kicker">Tutorials</p>
      <h1>Tutorials and Walkthroughs</h1>
      <p>Step-by-step practical guides with focused workflows, commands, and explanations you can follow from start to finish.</p>
    </section>

    <section class="privacy-section blog-search-panel">
      <div class="blog-filter-grid">
        <div>
          <label for="tutorialSearchInput">Search tutorial titles or filenames</label>
          <input
            type="search"
            id="tutorialSearchInput"
            maxlength="120"
            placeholder="Search by title or filename"
            autocomplete="off"
          >
        </div>
        <div>
          <label for="tutorialCategorySelect">Filter by topic</label>
          <select id="tutorialCategorySelect">
            <option value="">All topics</option>
          </select>
        </div>
      </div>
      <p id="tutorialResultsStatus" class="resource-status" aria-live="polite">Loading tutorials...</p>
    </section>

    <section id="tutorial-articles" class="blog-directory-list" aria-live="polite">
      <section class="privacy-section">
        <h2>Loading tutorials...</h2>
      </section>
    </section>

    <noscript>
      <section class="privacy-section">
        <h2>Tutorials</h2>
        <ul>
          <li><a href="tutorial-articles/github-git-fundamentals.html">Git and GitHub Fundamentals — Repositories, Commits, Branches, and Pull Requests</a></li>
        </ul>
      </section>
    </noscript>
  </main>

  <script src="dist/js/games.js"></script>
  <script src="dist/js/header.js"></script>
  <script src="dist/js/index.js"></script>
  <script src="dist/js/tutorials.js"></script>
</body>
</html>
