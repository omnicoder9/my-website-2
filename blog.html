<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="site-header"></div>

  <main class="privacy-page blog-directory-page">
    <section class="privacy-hero blog-directory-hero">
      <p class="privacy-kicker">Blog</p>
      <h1>Articles</h1>
      <p>Standalone posts with search and default sorting from most recent to oldest.</p>
    </section>

    <section class="privacy-section blog-search-panel">
      <label for="blogSearchInput">Search article titles</label>
      <input
        type="search"
        id="blogSearchInput"
        placeholder="Search by title"
        autocomplete="off"
      >
      <p id="blogResultsStatus" class="resource-status" aria-live="polite">Loading articles...</p>
    </section>

    <section id="blog-articles" class="blog-directory-list" aria-live="polite">
      <section class="privacy-section">
        <h2>Loading articles...</h2>
      </section>
    </section>

    <noscript>
      <section class="privacy-section">
        <h2>Articles</h2>

          <li><a href="blog-articles/us-citizen-politics-guide.html">Your Voice, Your Government: A Citizen's Guide to Political Power</a></li>

          <li><a href="blog-articles/suffering_humans_vs_animals.html">Who Suffers More? Humans vs. Animals</a></li>
          <li><a href="blog-articles/fraud-and-ai.html">The Oldest Game: Fraud in the Age of AI</a></li>
