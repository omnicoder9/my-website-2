<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 860" role="img" aria-labelledby="title desc">
  <title id="title">High reliability organization principles as concentric rings</title>
  <desc id="desc">A clean concentric ring diagram showing five high reliability organization principles. Numbered ring markers correspond to a high-contrast legend for preoccupation with failure, reluctance to simplify, sensitivity to operations, commitment to resilience, and deference to expertise.</desc>
  <style>
    .bg { fill: #f7f2ea; }
    .rule { stroke: #c8b99a; stroke-width: 1.5; }
    .eyebrow { fill: #8b2e12; font: 700 16px Arial, sans-serif; letter-spacing: 3px; }
    .title { fill: #1a1612; font: 700 40px Georgia, serif; }
    .subtitle { fill: #5f5447; font: 20px Arial, sans-serif; }
    .small-label { fill: #6b5f50; font: 700 13px Arial, sans-serif; letter-spacing: 2.4px; }
    .badge { fill: #fffaf2; stroke: #1a1612; stroke-width: 2.5; }
    .badge-text { fill: #1a1612; font: 700 20px Arial, sans-serif; text-anchor: middle; dominant-baseline: central; }
    .legend-card { fill: #fffaf2; stroke: #c8b99a; stroke-width: 1.5; rx: 8; }
    .legend-title { fill: #1a1612; font: 700 20px Georgia, serif; }
    .legend-copy { fill: #4f463b; font: 16px Arial, sans-serif; }
    .legend-number { fill: #fffaf2; font: 700 17px Arial, sans-serif; text-anchor: middle; dominant-baseline: central; }
    .legend-number.dark { fill: #1a1612; }
  </style>

  <rect class="bg" width="1200" height="860"/>
  <path class="rule" d="M70 174H1130"/>

  <text class="eyebrow" x="70" y="72">HIGH RELIABILITY ORGANIZATION</text>
  <text class="title" x="70" y="120">Five principles of mindful organizing</text>
  <text class="subtitle" x="70" y="154">Each numbered ring maps to one principle in the legend.</text>

  <g transform="translate(405 520)">
    <circle r="302" fill="#17343b"/>
    <circle r="242" fill="#8b2e12"/>
    <circle r="182" fill="#d9c7a3"/>
    <circle r="122" fill="#315f5a"/>
    <circle r="64" fill="#f0b44c"/>

    <circle r="302" fill="none" stroke="#1a1612" stroke-width="2.5"/>
    <circle r="242" fill="none" stroke="#fff7ed" stroke-opacity="0.52" stroke-width="1.6"/>
    <circle r="182" fill="none" stroke="#1a1612" stroke-opacity="0.34" stroke-width="1.6"/>
    <circle r="122" fill="none" stroke="#fff7ed" stroke-opacity="0.52" stroke-width="1.6"/>
    <circle r="64" fill="none" stroke="#1a1612" stroke-opacity="0.36" stroke-width="1.6"/>

    <circle class="badge" cx="260" cy="-82" r="23"/>
    <text class="badge-text" x="260" y="-82">1</text>
    <circle class="badge" cx="202" cy="-54" r="23"/>
    <text class="badge-text" x="202" y="-54">2</text>
    <circle class="badge" cx="143" cy="-27" r="23"/>
    <text class="badge-text" x="143" y="-27">3</text>
    <circle class="badge" cx="88" cy="2" r="23"/>
    <text class="badge-text" x="88" y="2">4</text>
    <circle class="badge" cx="0" cy="0" r="24"/>
    <text class="badge-text" x="0" y="0">5</text>
  </g>

  <g transform="translate(790 250)">
    <text class="small-label" x="0" y="0">OUTER RINGS: DETECT WEAK SIGNALS</text>
    <rect class="legend-card" x="0" y="20" width="350" height="82" rx="8"/>
    <circle cx="31" cy="61" r="19" fill="#17343b"/>
    <text class="legend-number" x="31" y="61">1</text>
    <text class="legend-title" x="66" y="53">Preoccupation with Failure</text>
    <text class="legend-copy" x="66" y="78">Near misses are treated as data, not noise.</text>

    <rect class="legend-card" x="0" y="116" width="350" height="82" rx="8"/>
    <circle cx="31" cy="157" r="19" fill="#8b2e12"/>
    <text class="legend-number" x="31" y="157">2</text>
    <text class="legend-title" x="66" y="149">Reluctance to Simplify</text>
    <text class="legend-copy" x="66" y="174">Easy explanations are held open for review.</text>

    <rect class="legend-card" x="0" y="212" width="350" height="82" rx="8"/>
    <circle cx="31" cy="253" r="19" fill="#d9c7a3" stroke="#1a1612"/>
    <text class="legend-number dark" x="31" y="253">3</text>
    <text class="legend-title" x="66" y="245">Sensitivity to Operations</text>
    <text class="legend-copy" x="66" y="270">Leaders stay close to live conditions.</text>

    <text class="small-label" x="0" y="344">INNER RINGS: RESPOND UNDER STRESS</text>
    <rect class="legend-card" x="0" y="364" width="350" height="82" rx="8"/>
    <circle cx="31" cy="405" r="19" fill="#315f5a"/>
    <text class="legend-number" x="31" y="405">4</text>
    <text class="legend-title" x="66" y="397">Commitment to Resilience</text>
    <text class="legend-copy" x="66" y="422">Teams rehearse recovery.</text>

    <rect class="legend-card" x="0" y="460" width="350" height="82" rx="8"/>
    <circle cx="31" cy="501" r="19" fill="#f0b44c" stroke="#1a1612"/>
    <text class="legend-number dark" x="31" y="501">5</text>
    <text class="legend-title" x="66" y="493">Deference to Expertise</text>
    <text class="legend-copy" x="66" y="518">Knowledge outranks hierarchy.</text>
  </g>
</svg>
